databases:
  - name: respondr-db
    plan: free
    databaseName: respondr_db
    user: respondr_user

services:
  # Backend API
  - type: web
    name: respondr-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npx knex migrate:latest --knexfile knexfile.js --env production && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: respondr-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: TEXTBEE_API_KEY
        sync: false
      - key: TEXTBEE_DEVICE_ID
        sync: false
      - key: EMERGENCY_CONTACT_NUMBER
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMERGENCY_CONTACT_EMAIL
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false

  # Frontend Static Site
  - type: web
    name: respondr-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
